<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>
    <style>
        .container{
            width: 100%;
            margin: 20px auto;
            background-color: aliceblue;
            padding: 12px;   
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://t4.ftcdn.net/jpg/02/00/56/25/360_F_200562584_6JdC7zrzin09Ws8viaw5OH3xIJEMLIVH.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            border-radius: 12px;
          
        }
        form{
            width: 50%;
        }
        .result{
            margin: 12px auto;
            background-color: aqua;
            padding: 12px;
            width: 50%;
            text-align: center;

        }
        .result h1{
                font-size: larger;
                font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;

        }
        .container form{
            display: flex;
            flex-direction: column;
           gap: 20px;
        }
        input{
           
            border-radius: 12px;
            padding: 12px;
            width: 95%;
            background-color: aquamarine;
        }
        button{
            border-radius: 12px;
            padding: 12px;
            width: 70%;
            margin: 12px auto;
           
        }
        label{
            color: cornflowerblue;
            font-size: larger;
            font-weight: bolder;
        }
        
    </style>
</head>
<body>
    <h1>Fill out the following detials</h1>
    <div class="container">
        
        <form action="{{url_for('Mode_predict')}}" id="Myform" method="post">
            <label for="" >Temperature</label>
            <input type="text" required id="Temprature" name="Temp">
            <label for="">RH</label>
            <input type="text" id="WS" name="WS">
            <label for="">WS </label>
            <input type="text" required>
            <label for="">FFMS</label >   Temperature	RH	Ws	FFMC	DMC	DC	ISI	BUI
            <input type="text" id="FFMS">
            <label for="">DMC</label>
            <input type="text" id="DMC">
            <label for="">DC</label>
            <input type="text" id="DC">
            <label for="">ISI</label>
            <input type="text" id="ISI">
            <label for="">BUI</label>
            <input type="text" id="BUI">


            <button type="submit" id ='but'>Predict!</button>
            </form>
    </div>


    <div class="result">
        <h1>{{ results }}</h1>
    </div>
    
</body>
<script>
   document.getElementById("but").addEventListener('click',function(){

   
   let  temp=document.getElementById("ID")

   if(temp.value<=0)
   {
               alert("Teprature enter negative!!")
              
   }

});


</script>
</html>
